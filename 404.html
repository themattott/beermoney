<script>
  const nav = document.querySelector('nav');
  const logo = document.querySelector('.nav-logo');
  let lastScrollY = window.scrollY;
  let scrollDelta = 0;
  let scrollTimer = null;
  let wobbleRAF = null;
  let currentTilt = 0;

  window.addEventListener('scroll', () => {
    nav.classList.toggle('scrolled', window.scrollY > 20);
    const dy = window.scrollY - lastScrollY;
    lastScrollY = window.scrollY;
    scrollDelta += dy;
    const targetTilt = Math.max(-2.5, Math.min(2.5, scrollDelta * 0.15));
    currentTilt += (targetTilt - currentTilt) * 0.3;
    logo.style.transform = 'rotate(' + currentTilt.toFixed(2) + 'deg)';
    clearTimeout(scrollTimer);
    scrollTimer = setTimeout(() => {
      startSettleWobble(currentTilt);
      scrollDelta = 0;
      currentTilt = 0;
    }, 80);
  });

  function startSettleWobble(startAngle) {
    if (wobbleRAF) cancelAnimationFrame(wobbleRAF);
    let angle = startAngle;
    let vel = 0;
    function tick() {
      vel -= angle * 0.35;
      vel *= 0.78;
      angle += vel;
      if (Math.abs(angle) > 0.1 || Math.abs(vel) > 0.1) {
        logo.style.transform = 'rotate(' + angle.toFixed(1) + 'deg)';
        wobbleRAF = requestAnimationFrame(tick);
      } else {
        logo.style.transform = 'rotate(0deg)';
        wobbleRAF = null;
      }
    }
    wobbleRAF = requestAnimationFrame(tick);
  }
</script>
