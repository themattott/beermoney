  .error-section { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; padding: 120px 48px 60px; text-align: center; overflow: hidden; }

  .btn:hover { background: var(--black); color: var(--cream); }

  .footer-logo { height: 90px; opacity: 0.7; }
  .footer-copy { font-size: 11px; font-weight: 400; letter-spacing: 2px; color: rgba(245,240,232,0.35); text-transform: uppercase; }

<script>
  let scrollTimeout;
  const nav = document.querySelector('nav');
  const logo = document.querySelector('.nav-logo');
  let rotation = 0;
  let angularVelocity = 0;
  let lastScrollY = 0;

  function easeOut(t) { return 1 - Math.pow(1 - t, 3); }

  window.addEventListener('scroll', () => {
    clearTimeout(scrollTimeout);
    const scrollY = window.scrollY;
    const deltaY = scrollY - lastScrollY;
    angularVelocity = deltaY * 0.15;
    lastScrollY = scrollY;

    scrollTimeout = setTimeout(() => {
      const springStiffness = 0.35;
      const damping = 0.78;
      let vel = angularVelocity;
      const steps = 60;
      for (let i = 0; i < steps; i++) {
        const f = -springStiffness * rotation;
        vel += f * 0.016;
        vel *= damping;
        rotation += vel * 0.016;
      }
      logo.style.transform = `rotateZ(${rotation}deg)`;
    }, 80);

    const maxRotation = 2.5;
    rotation = Math.max(-maxRotation, Math.min(maxRotation, rotation + angularVelocity));
    logo.style.transform = `rotateZ(${rotation}deg)`;
    nav.classList.add('scrolled');
  });

  window.addEventListener('scrollend', () => {
    nav.classList.remove('scrolled');
  });
</script>
